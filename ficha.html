<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<style>
    body {
    padding: 0 20px;
}

/*nav*/


nav .container {
    display: flex;
    justify-content: space-between;
    /* separa izquierda y derecha */
    align-items: center;
    padding: 0 20px;
    color: rgb(36, 124, 172);

}

.icono01 {
    display: flex;
    gap: 6px;
    top: 10px;
}

nav ul {

    display: flex;
    gap: 20px;
    list-style: none;
    margin: 0;
    padding: 0;

}

nav ul li {
    display: block;

}

nav ul li a {
    color: rgb(105, 104, 104);
    text-decoration: none;

    font-size: 20px;
    transition: all .3s ease;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

/*header*/

header {
    background-color: rgb(202, 196, 196);
    border-radius: 10px;
    padding: 20px 15px;
    text-align: center;
}

.buscador input {
    width: 450px;
    padding: 5px 15px;



}

.buscador .boton01 {
    padding: 5px 15px;
    background-color: rgb(0, 162, 255);
    color: white;
    cursor: pointer;
}



/*TABLA*/

.titulo02 {
    font-size: 18px;

    display: flex;
    gap: 8px;

}

table {
    width: 100%;
    border-collapse: collapse;


}

thead {
    background-color: #1d4ed8;
    color: white;
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

th {
    padding: 15px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

td {
    padding: 15px;
    border-bottom: 1px solid #ddd;
    text-align: center;
}

.aplicar {
    background-color: #22c55e;
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    cursor: pointer;
}

/*FOOTER*/
.container03 p {
    text-align: center;
    word-spacing: 2px;
    /* separa palabras */
    color: rgb(139, 137, 137);

}
</style>


<nav>
    <div class="container04">
        <a href="index.html"><img src="iconos/flecha.svg" alt="">Volver a Ofertas</a>
    </div>

</nav>




<body>

    <h1> 📋Ficha de Postulacion</h1>
    <p>Puesto: Frontend Developer Trainee</p>

    <main>
        <form action="">
            <fieldset class="cuadro01">
                <legend class="parte01">Datos Personales</legend>
                <label for="">Nombre Completo:</label><br>
                <input type="text" placeholder="Tu nombre aqui" required
                    oninvalid="this.setCustomValidity('Ingresa tus Nombres! 😠' )"
                    oninput="this.setCustomValidity('')"><br><br>

                <label for="">Correo Electronico:</label><br>
                <input type="email" placeholder="ejemplo@gmail.com" required
                    oninvalid="this.setCustomValidity('Ingresa tus Apellidos! 😠')"
                    oninput="this.setCustomValidity('')"><br><br>

                <label for="">Telefono:</label><br>
                <input type="number" placeholder="+51 999 999 999" required
                    oninvalid="this.setCustomValidity('Ingresa tu numero de telefono! 😠')"
                    oninput="this.setCustomValidity('')"><br><br>

            </fieldset><br><br>

            <fieldset class="cuadro02">

                <legend class="parte02">Perfil Tecnico</legend>
                <label for="">Link de GitHub:</label><br>
                <input type="text" placeholder="https://github.com/usuario" required
                    oninvalid="this.setCustomValidity('!Oye No olvides colocar tu link' )"
                    oninput="this.setCustomValidity('')"><br><br>
                <label for="">Nivel de Ingles:</label><br>
                <select name="" id="">
                    <option value="">Basico</option>
                    <option value="">Intermedio</option>
                    <option value="">Avanzado</option>
                </select><br><br>

                <div class="tecnologias">
                    <p>Tecnologías (Marca las que sepas):</p>

                    <label><input type="checkbox"> HTML5</label>
                    <label><input type="checkbox"> CSS3</label>
                    <label><input type="checkbox"> JavaScript</label>
                </div>

            </fieldset><br>


            
                <button class="boton02" type="submit">Guardar Datos </button>
           
            

        </form>
    </main>

</body>
